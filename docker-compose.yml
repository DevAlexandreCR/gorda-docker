name: gorda

networks:
  app:

volumes:
  postgres_data:

services:
  admin:
    container_name: gorda_admin
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/admin
    networks:
      - app
    volumes:
      - ../:/workspace
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -lc "if [ ! -d node_modules ]; then npm install; fi &&
      npm run watch"

  api:
    container_name: gorda_api
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/api
    networks:
      - app
    ports:
      - "3000:3000"
    volumes:
      - ../:/workspace
      - ../api/firebaseAccount.json:/tmp/firebaseAccount.json:ro
    command: >
      sh -lc "if [ ! -d node_modules ]; then npm install; fi &&
      npm run watch"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ia:
        condition: service_started
      emulators:
        condition: service_started

  functions:
    container_name: gorda_functions
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/functions
    networks:
      - app
    volumes:
      - ../:/workspace
      - ../api/firebaseAccount.json:/tmp/firebaseAccount.json:ro
    command: >
      sh -lc "if [ ! -d node_modules ]; then npm install; fi &&
      npm run watch"

  emulators:
    container_name: gorda_emulators
    build:
      context: ./emulators
    working_dir: /workspace/admin
    networks:
      - app
    ports:
      - "4000:4000"
      - "5005:5000"
      - "5001:5001"
      - "8080:8080"
      - "9000:9000"
      - "9099:9099"
      - "9199:9199"
    volumes:
      - ../:/workspace
      - ../api/firebaseAccount.json:/tmp/firebaseAccount.json:ro
    command: >
      sh -lc "until [ -d /workspace/functions/node_modules ] && [ -f /workspace/functions/lib/index.js ] && [ -f /workspace/admin/dist/index.html ]; do
      echo 'Waiting for functions and admin build artifacts...';
      sleep 2;
      done;
      firebase emulators:start --project gorda-driver --config firebase.json --only auth,database,firestore,storage,functions,hosting,ui --import dataEmulators --export-on-exit"
    depends_on:
      functions:
        condition: service_started
      admin:
        condition: service_started

  redis:
    container_name: gorda_redis
    image: redis:7-alpine
    networks:
      - app
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis-data:/data

  postgres:
    container_name: gorda_postgres
    platform: linux/amd64
    build:
      context: ./db
    networks:
      - app
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_ROOT_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  ia:
    container_name: gorda_ia
    build:
      context: ./ia
    working_dir: /app
    networks:
      - app
    ports:
      - "8000:8000"
    tty: true
    volumes:
      - ../ia-app:/app
    environment:
      PYTHONPATH: /app
      SHELL: /bin/zsh
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
